<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acesso - Gestão de Pátio</title>
    <style>
        /* DESIGN NEON EQUILIBRADO E TEMA SHOPEE XPRESS (LARANJA) */
        body { margin: 0; font-family: 'Consolas', 'Courier New', monospace; background-color: #07090f; display: flex; justify-content: center; align-items: center; height: 100vh; color: #ee4d2d; }
        .caixa-login { background: #0b101a; padding: 40px; border-radius: 12px; box-shadow: 0 0 25px rgba(238, 77, 45, 0.05); width: 350px; text-align: center; border: 1px solid rgba(238, 77, 45, 0.2); position: relative; overflow: hidden;}
        .caixa-login::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: #ee4d2d; box-shadow: 0 0 15px #ee4d2d; }
        
        /* O ESPAÇO RESERVADO PARA A LOGO (COM MEGA ZOOM DA ÚLTIMA ATUALIZAÇÃO) */
        .logo-shopee {
            width: 100%;
            height: 60px; 
            margin: 20px auto 45px auto; /* Margem ajustada para dar espaço ao GIF */
            background-image: url('https://i.imgur.com/Z0lEejO.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            transform: scale(4.0); 
        }

        /* ESPAÇO RESERVADO PARA O SEU GIF ANIMADO */
        .mascote-gif {
            width: 100%;
            max-width: 130px; /* Altere aqui se quiser o cachorrinho maior ou menor */
            height: auto;
            margin: -10px auto 15px auto; 
            display: block;
        }
        
        h2 { margin: 0 0 25px 0; color: #fff; font-weight: 600; font-size: 14px; font-family: 'Segoe UI', sans-serif; letter-spacing: 2px; text-shadow: 0 0 10px rgba(238, 77, 45, 0.3); text-transform: uppercase;}
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: rgba(0,0,0,0.6); border: 1px solid rgba(238, 77, 45, 0.3); border-radius: 6px; box-sizing: border-box; font-size: 15px; color: #fff; outline: none; transition: all 0.3s ease; font-family: inherit;}
        input::placeholder { color: #4a5568; }
        input:focus, select:focus { border-color: #ee4d2d; box-shadow: 0 0 12px rgba(238, 77, 45, 0.2); background: rgba(238, 77, 45, 0.02); }
        
        select { font-weight: bold; text-transform: uppercase; color: #ee4d2d; text-align: center;}
        option { background: #0b101a; color: #fff; }

        .btn { width: 100%; padding: 14px; background: rgba(238, 77, 45, 0.1); color: #ee4d2d; border: 1px solid #ee4d2d; border-radius: 6px; font-family: 'Segoe UI', sans-serif; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase;}
        .btn:hover { background: #ee4d2d; color: #fff; box-shadow: 0 0 15px rgba(238, 77, 45, 0.6); }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <script>
        if (sessionStorage.getItem('usuarioLogado')) {
            window.location.href = "painel.html";
        }
    </script>

    <div class="caixa-login">
        <div id="formLogin">
            <div class="logo-shopee"></div>

            <img src="mascote.gif" alt="Mascote Operação" class="mascote-gif" onerror="this.style.display='none'">
            
            <h2 id="statusNuvem" style="color: #f1c40f;">CONECTANDO...</h2>
            
            <select id="lugarLogin">
                <option value="">Aguardando Servidor...</option>
            </select>
            
            <input type="password" id="senhaLogin" placeholder="Digite a Senha" required autocomplete="off" onkeypress="if(event.key === 'Enter') { event.preventDefault(); fazerLogin(); }">
            
            <button type="button" class="btn" onclick="fazerLogin()">ACESSAR PÁTIO</button>
        </div>
    </div>

    <script>
        const TOTAL_DE_MESAS = 15;

        // ==========================================
        // CONFIGURAÇÃO ATIVA: UBERABA
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyDFQPqoRF6BZm76yAioqhaoOzf8aSjijyU",
            authDomain: "gestao-de-doca.firebaseapp.com",
            databaseURL: "https://gestao-de-doca-default-rtdb.firebaseio.com",
            projectId: "gestao-de-doca",
            storageBucket: "gestao-de-doca.firebasestorage.app",
            messagingSenderId: "574246315988",
            appId: "1:574246315988:web:eacaaef9a2fc82393e9841",
            measurementId: "G-QWJNRFZBX5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let mesasOcupadas = [];
        let mesasCarregadas = false; 

        db.ref('.info/connected').on('value', function(connectedSnap) {
            if (connectedSnap.val() === true) {
                let statusEl = document.getElementById('statusNuvem');
                statusEl.innerText = "GESTÃO DE PÁTIO";
                statusEl.style.color = "#fff";
            }
        });

        db.ref('mesasOcupadas').on('value', (snapshot) => {
            mesasOcupadas = snapshot.val() || [];
            carregarMesasLivres();
            mesasCarregadas = true;
        }, (error) => {
            console.warn("Regras do Firebase podem estar bloqueadas. Forçando exibição.", error);
            carregarMesasLivres();
            mesasCarregadas = true;
        });

        setTimeout(() => {
            if(!mesasCarregadas) {
                console.warn("Firebase demorou a responder. Forçando carregamento das mesas.");
                carregarMesasLivres();
            }
        }, 3000);

        function carregarMesasLivres() {
            const selectLugar = document.getElementById('lugarLogin');
            const valorAtual = selectLugar.value; 
            
            selectLugar.innerHTML = '';
            
            let optionAdmin = document.createElement('option');
            optionAdmin.value = 'Admin';
            optionAdmin.text = '🔧 ACESSO ADMIN';
            selectLugar.appendChild(optionAdmin);
            
            let temMesaLivre = false;

            // ==========================================
            // LOGINS EXCLUSIVOS DE FINAL DE FILA 1 E 2
            // ==========================================
            if(!mesasOcupadas.includes('Final de Fila 1')) {
                let optionFF1 = document.createElement('option');
                optionFF1.value = 'Final de Fila 1';
                optionFF1.text = '🚨 FINAL DE FILA 1';
                selectLugar.appendChild(optionFF1);
                temMesaLivre = true;
            }

            if(!mesasOcupadas.includes('Final de Fila 2')) {
                let optionFF2 = document.createElement('option');
                optionFF2.value = 'Final de Fila 2';
                optionFF2.text = '🚨 FINAL DE FILA 2';
                selectLugar.appendChild(optionFF2);
                temMesaLivre = true;
            }

            // MESAS NORMAIS (1 A 15)
            for(let i = 1; i <= TOTAL_DE_MESAS; i++) {
                let nomeMesa = 'Mesa ' + i;
                if(!mesasOcupadas.includes(nomeMesa)) {
                    let option = document.createElement('option');
                    option.value = nomeMesa;
                    option.text = '🖥️ ' + nomeMesa.toUpperCase();
                    selectLugar.appendChild(option);
                    temMesaLivre = true;
                }
            }

            if(valorAtual && Array.from(selectLugar.options).some(opt => opt.value === valorAtual)) {
                selectLugar.value = valorAtual;
            } else if (!temMesaLivre) {
                selectLugar.value = "Admin";
            }
        }

        function fazerLogin() {
            const lugar = document.getElementById('lugarLogin').value; 
            const s = document.getElementById('senhaLogin').value.trim();
            
            if(!lugar) return alert("Selecione a mesa ou o acesso Admin.");
            if(!s) return alert("Digite a senha.");

            if(lugar === 'Admin') {
                if(s === 'spxadmin123') {
                    logarComo('ADMIN', 'admin', 'Admin');
                } else {
                    alert("Acesso Negado: Senha de Administrador incorreta!");
                }
                return;
            }

            if (s === 'Seagroup.com') {
                db.ref('mesasOcupadas').once('value').then((snapshot) => {
                    let atuais = snapshot.val() || [];
                    if(atuais.includes(lugar)) {
                        return alert("Este acesso já está em uso por outro operador. Escolha outro.");
                    }
                    atuais.push(lugar);
                    db.ref('mesasOcupadas').set(atuais).then(() => {
                        logarComo(lugar.toUpperCase(), 'operador', lugar);
                    });
                }).catch(() => {
                    logarComo(lugar.toUpperCase(), 'operador', lugar);
                });
            } else { 
                alert("Acesso Negado: Senha da Mesa incorreta!"); 
            }
        }

        function logarComo(usuario, role, lugar) {
            sessionStorage.setItem('usuarioLogado', usuario);
            sessionStorage.setItem('roleLogado', role);
            sessionStorage.setItem('lugarLogado', lugar);
            window.location.href = "painel.html"; 
        }
    </script>
</body>
</html>
